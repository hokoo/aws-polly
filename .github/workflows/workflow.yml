name: Build zip
on:
  release:
    types:
      - published

permissions: write-all
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source code
        uses: actions/checkout@v3

      - uses: shivammathur/setup-php@v2
        name: Set up PHP
        with:
          php-version: 8.2
          coverage: none

      - name: Install PHP Dependencies
        uses: ramsey/composer-install@v2
        with:
          working-directory: plugin-dir
          composer-options: "--no-dev"

      - name: Build minimal release package
        run: |
          mkdir -p dist/aws-polly
          rsync -a plugin-dir/ dist/aws-polly/ \
            --exclude 'assets/' \
            --exclude 'README.md' \
            --exclude 'composer.json' \
            --exclude 'composer.lock'
          rm -rf dist/aws-polly/vendor/aws/Aws
          find dist/aws-polly/vendor -type d \( \
            -name .github -o \
            -name tests -o \
            -name test -o \
            -name docs -o \
            -name bin \
          \) -prune -exec rm -rf {} +
          find dist/aws-polly/vendor -type f \( \
            -name composer.json -o \
            -name composer.lock -o \
            -name phpunit.xml -o \
            -name phpunit.xml.dist -o \
            -name README.md -o \
            -name CHANGELOG.md -o \
            -name .gitignore -o \
            -name .gitattributes \
          \) -delete
          cd dist
          zip -r -q -9 -X ../aws-polly-wp-plugin-${{ github.ref_name }}.zip aws-polly
          echo "Zipped to aws-polly-wp-plugin-${{ github.ref_name }}.zip"

      - name: Upload Release Artifact
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ./aws-polly-wp-plugin-${{ github.ref_name }}.zip
          repo-token: ${{ secrets.GITHUB_TOKEN }}
